name: restaurant_order_system
description: "Restaurant Order System"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  mobile_scanner: ^7.0.1
  path: ^1.9.1
  qr_flutter: ^4.1.0
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/restaurant-logo-white-padded.png"
  adaptive_icon_background: "#BF9B6F"
  adaptive_icon_foreground: "assets/restaurant-logo-white-padded.png"
  adaptive_icon_foreground_inset: 24

flutter_native_splash:
  color: "#BF9B6F"
  image: "assets/restaurant-logo-white-padded.png"
  fullscreen: true
  android_12:
    color: "#BF9B6F"
    image: "assets/restaurant-logo-white-splash.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/menus/

  fonts:
    - family: Istok Web
      fonts:
        - asset: assets/fonts/IstokWeb-Regular.ttf
          weight: 400
        - asset: assets/fonts/IstokWeb-Bold.ttf
          weight: 700
        - asset: assets/fonts/IstokWeb-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/IstokWeb-BoldItalic.ttf
          weight: 700
          style: italic
